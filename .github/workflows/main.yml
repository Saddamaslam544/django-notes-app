name: Django CI/CD to ECR

on:
push:
branches:
- main

env:
AWS_REGION: us-east-1
ECR_REPOSITORY: django-app
IMAGE_TAG: latest

jobs:
build-and-push:
name: Build & Push to ECR
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Configure AWS Credentials
    uses: aws-actions/configure-aws-credentials@v4
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ env.AWS_REGION }}

  - name: Login to Amazon ECR
    uses: aws-actions/amazon-ecr-login@v2

  - name: Build Docker Image
    run: |
      docker build -t $ECR_REPOSITORY .

  - name: Tag Image
    run: |
      docker tag $ECR_REPOSITORY:latest \
      ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

  - name: Push Image to ECR
    run: |
      docker push \
      ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG
```

deploy:
name: Deploy to EC2
runs-on: ubuntu-latest
needs: build-and-push

```
steps:
  - name: SSH into EC2 & Deploy
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ubuntu
      key: ${{ secrets.EC2_SSH_KEY }}
      script: |
        docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

        docker stop django-container || true
        docker rm django-container || true

        docker run -d \
          --name django-container \
          -p 8000:8000 \
          -e DB_NAME=mydb \
          -e DB_USER=root \
          -e DB_PASSWORD=pass \
          -e DB_HOST=db \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG
```
